# Codemagic CI/CD Configuration for Don't Touch Red

workflows:
  android-workflow:
    name: Android Build Workflow
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      groups:
        - dynamic_env_vars  # هذه المجموعة يجب أن تحتوي على متغيرات keystore
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
      
      - name: Decode Keystore
        script: |
          # إنشاء مجلد keystore
          mkdir -p android/app/keystore
          # فك تشفير ملف keystore من المتغير البيئي
          echo $CM_KEYSTORE | base64 --decode > android/app/keystore/upload-keystore.jks
      
      - name: Create key.properties
        script: |
          # إنشاء ملف key.properties من المتغيرات البيئية
          echo "storePassword=$CM_KEYSTORE_PASSWORD" > android/key.properties
          echo "keyPassword=$CM_KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$CM_KEY_ALIAS" >> android/key.properties
          echo "storeFile=../app/keystore/upload-keystore.jks" >> android/key.properties
      
      - name: Get Flutter dependencies
        script: |
          flutter pub get
      
      - name: Flutter analyze
        script: |
          flutter analyze
      
      - name: Build Android APK
        script: |
          flutter build apk --release --build-name=1.0.$BUILD_NUMBER --build-number=$BUILD_NUMBER
      
      - name: Build Android App Bundle (AAB)
        script: |
          flutter build appbundle --release --build-name=1.0.$BUILD_NUMBER --build-number=$BUILD_NUMBER
    
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    
    publishing:
      email:
        recipients:
          - miosegundamano9@gmail.com
        notify:
          success: true
          failure: true
